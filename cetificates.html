<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="./images/cetiicon.png">
  <title>Certifications</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      background: #0b0b0b;
      color: white;
    }

    .cert-section {
      padding: 60px 30px;
      text-align: center;
    }

    .cert-title {
      font-size: 36px;
      font-weight: 700;
      margin-bottom: 30px;
    }
    .cert-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0px; 
      max-width: 1200px;
      margin: auto;
    }

    .cert-item {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .cert-item img {
      width: 240px;  
      max-width: 100%;
      border-radius: 30px;
      height: auto;
      object-fit: contain;
      margin-bottom: 8px;
    }

    .cert-item span {
      font-size: 16px;
      font-weight: 600;
    }
    @media (max-width: 900px) {
      .cert-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .cert-item img {
        width: 240px;
      }
    }
    @media (max-width: 500px) {
      .cert-grid {
        grid-template-columns: 1fr;
      }

      .cert-item img {
        width: 260px;
      }
    }
  </style>
</head>

<body>

  <section class="cert-section">
    <h2 class="cert-title">Certifications & Skills</h2>

    <div class="cert-grid">

      <div class="cert-item">
        <img src="Imagess/sql-serve.jpeg" alt="SQL">
        <span>SQL</span>
      </div>

      <div class="cert-item">
        <img src="Imagess/Cloud-Computing.png" alt="Cloud Computing">
        <span>Cloud Computing</span>
      </div>

      <div class="cert-item">
        <img src="Imagess/Python.png" alt="Python">
        <span>Python</span>
      </div>

      <div class="cert-item">
        <img src="Imagess/HTML1.jpg" alt="HTML">
        <span>HTML</span>
      </div>

      <div class="cert-item">
        <img src="Imagess/NPTEL.png" alt="NPTEL">
        <span>Joy of Computing Using Python</span>
      </div>

      <div class="cert-item">
        <img src="Imagess/AWS-Cloud-Practitioner-Essentials.png" alt="AWS">
        <span>AWS</span>
      </div>

    

    </div>
  </section>

</body>
</html>
